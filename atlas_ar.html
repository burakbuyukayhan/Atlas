<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS Monoblok Model AR View</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* SPLASH SCREEN */
        #splash {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.8s ease;
        }

        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo-img {
            width: 180px;
            height: 180px;
            margin-bottom: 20px;
        }

        /* MARİNCOOL logosu SVG ile */
        .brand-name {
            color: white;
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-style: italic;
        }

        .brand-name span {
            color: #fff;
        }

        .enter-btn {
            background: rgba(100, 100, 100, 0.5);
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 40px;
            font-size: 18px;
            cursor: pointer;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.3s;
        }

        .enter-btn:hover {
            background: rgba(150, 150, 150, 0.5);
        }

        /* VIEWER EKRANI */
        #viewer-screen {
            display: none;
            flex-direction: column;
            min-height: 100vh;
            background: #0a0a1a;
        }

        #viewer-screen.visible {
            display: flex;
        }

        .top-bar {
            background: #000;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #222;
        }

        .top-bar-logo {
            color: white;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 4px;
            font-style: italic;
        }

        .model-title {
            text-align: center;
            padding: 14px;
            color: #4FC3F7;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            background: #0a0a1a;
        }

        model-viewer {
            width: 100%;
            height: 72vh;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 100%);
            --poster-color: transparent;
        }

        .bottom-bar {
            background: #000;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        #ar-button {
            background: #555;
            color: white;
            border: none;
            padding: 16px 0;
            border-radius: 30px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 380px;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }

        #ar-button.ready {
            background: linear-gradient(135deg, #00C853, #00E676);
            box-shadow: 0 4px 20px rgba(0,200,83,0.4);
        }

        .hint {
            color: #555;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>

    <!-- VIEWER EKRANI -->
    <div id="viewer-screen">
        <div class="top-bar">
            <div class="top-bar-logo">MARiNCOOL</div>
        </div>
        <div class="model-title">ATLAS Monoblok Model</div>

        <model-viewer
            id="viewer"
            src="model.glb"
            alt="Atlas Monoblok 3D Model"
            ar
            ar-modes="scene-viewer webxr quick-look"
            ar-scale="auto"
            camera-controls
            touch-action="pan-y"
            auto-rotate
            auto-rotate-delay="1000"
            rotation-per-second="15deg"
            shadow-intensity="1"
            exposure="1.2"
            environment-image="neutral"
            loading="eager">
        </model-viewer>

        <div class="bottom-bar">
            <button id="ar-button" onclick="startAR()">⏳ Yükleniyor...</button>
            <div class="hint">Döndür • Zoom yap • AR için yeşil butona bas</div>
        </div>
    </div>

    <script>
        const viewer = document.getElementById('viewer');
        const btn = document.getElementById('ar-button');

        function enterViewer() {
            document.getElementById('splash').classList.add('hidden');
            document.getElementById('viewer-screen').classList.add('visible');
        }

        viewer.addEventListener('load', () => {
            btn.textContent = "📱 AR'da Görüntüle";
            btn.classList.add('ready');
        });

        function startAR() {
            if (viewer.canActivateAR) {
                viewer.activateAR();
            } else {
                alert('Yeşil olana kadar bekleyin.');
            }
        }
    </script>

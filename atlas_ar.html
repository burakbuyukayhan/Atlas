<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS Monoblok Model AR View</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: Arial, sans-serif; min-height: 100vh; overflow-x: hidden; }

        /* SPLASH */
        #splash {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.8s ease;
            gap: 60px;
        }
        #splash.hidden { opacity: 0; pointer-events: none; }

        .splash-logo {
            width: 80%;
            max-width: 500px;
            height: auto;
        }

        .enter-btn {
            background: rgba(80, 80, 80, 0.6);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 14px 36px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .enter-btn:hover { background: rgba(120,120,120,0.6); }

        /* VIEWER */
        #viewer-screen { display: none; flex-direction: column; min-height: 100vh; background: #0a0a1a; position: relative; }
        #viewer-screen.visible { display: flex; }

        .top-bar {
            background: #000;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #222;
        }
        .top-bar img { height: 70px; }

        .model-title {
            text-align: center;
            padding: 12px;
            color: #4FC3F7;
            font-size: 17px;
            font-weight: bold;
            letter-spacing: 1px;
            background: #0a0a1a;
        }

        model-viewer {
            width: 100%;
            height: 72vh;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 100%);
            --poster-color: transparent;
        }

        .bottom-bar {
            background: #000;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        #ar-button {
            background: #444;
            color: white;
            border: none;
            padding: 16px 0;
            border-radius: 30px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 380px;
            transition: all 0.3s;
        }
        #ar-button.ready {
            background: linear-gradient(135deg, #555555, #777777);
            box-shadow: 0 4px 20px rgba(100,100,100,0.4);
        }
        .hint { color: #555; font-size: 12px; text-align: center; }
    </style>
</head>
